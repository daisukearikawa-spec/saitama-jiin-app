        function getFormattedNow() {
            const days = ["日", "月", "火", "水", "木", "金", "土"];
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const day = days[now.getDay()];
            const hours = String(now.getHours()).padStart(2, '0');

        // 検索絞り込み

        }

        // --- ★タブ切り替え用のJavascriptロジック（新規追加） ---
        function switchTab(tabId) {
            const tabs = ['basic', 'delivery', 'ceremony', 'notes'];
            
            // すべてのコンテンツを非表示に
            tabs.forEach(t => {
                document.getElementById(`tab-content-${t}`).classList.add('hidden');
                
                // ボタンの境界線と文字色をリセット
                const btn = document.getElementById(`btn-tab-${t}`);
                btn.className = "flex-1 py-3 text-center border-b-2 border-transparent transition";
            });

            // 選択されたタブのみを表示・強調
            document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`btn-tab-${tabId}`);
            activeBtn.className = "flex-1 py-3 text-center border-b-2 border-emerald-700 text-emerald-800 font-bold transition";
        }

        // --- 「管理者に伝える」メッセージのテキスト自動生成ロジック ---
        function generateShareText(t) {
            let text = `【周辺寺院アプリ 修正・登録情報】\n`;
            text += `■ 寺院名: ${t.name} (${t.kana})\n`;
            text += `■ 宗派: ${t.sect} (${t.sect_kana})\n`;
            text += `■ 住所: 〒${t.postal_code} ${t.address}\n`;
            text += `■ 電話: ${t.phone} / FAX: ${t.fax}\n`;
            text += `■ 公式ホームページ: ${t.has_website === '有り' ? t.website_url : '無し'}\n`;
            text += `■ 書き物届け: ${t.has_delivery === '有り' ? t.delivery_items.join(', ') + ' / ' + t.delivery_other : '無し'}\n`;
            text += `■ お迎え送迎: ${t.has_pickup === '有り' ? '有り（' + t.pickup_details.join(', ') + '）' : '無し（' + t.pickup_details.join(', ') + '）'}\n`;
            if (t.pickup_other) text += `  (送迎その他: ${t.pickup_other})\n`;
            text += `■ 初七日法要: ${t.first_seven_days === 'その他' ? t.first_seven_other : t.first_seven_days}\n`;
            text += `■ 火葬場への同行: ${t.crematory_accompany === 'その他' ? t.crematory_accompany_other : t.crematory_accompany}\n`;
            text += `■ 注意事項: ${t.notes || 'なし'}\n\n`;
            
            text += `【通夜の進行】\n`;
            text += `・入場時: ${t.tsuya_entry === 'その他' ? t.tsuya_entry_other : t.tsuya_entry}\n`;
            text += `・開式の辞: ${t.tsuya_opening}\n`;
            text += `・焼香: ${t.tsuya_shoko || '情報なし'}\n`;
            text += `・法話: ${t.tsuya_howa === '有り' ? t.tsuya_howa_time : '無し'}\n`;
            text += `・退場: ${t.tsuya_exit === 'その他' ? t.tsuya_exit_other : t.tsuya_exit}\n`;
            text += `・全体の読経時間: ${t.tsuya_chant_time ? '約 ' + t.tsuya_chant_time + ' 分' : '情報なし'}\n\n`;
            
            text += `【告別式の進行】\n`;
            text += `・入場時: ${t.kokubetsu_entry === 'その他' ? t.kokubetsu_entry_other : t.kokubetsu_entry}\n`;
            text += `・開式の辞: ${t.kokubetsu_opening}\n`;
            text += `・引導: ${t.kokubetsu_indo || '情報なし'}\n`;
            text += `・焼香: ${t.kokubetsu_shoko || '情報なし'}\n`;
            text += `・法話: ${t.kokubetsu_howa === '有り' ? t.kokubetsu_howa_time : '無し'}\n`;
            text += `・退場: ${t.kokubetsu_exit === 'その他' ? t.kokubetsu_exit_other : t.kokubetsu_exit}\n`;
            text += `・出棺先導: ${t.kokubetsu_shukkan_sendo || '不明'}\n`;
            text += `・全体の読経時間: ${t.kokubetsu_chant_time ? '約 ' + t.kokubetsu_chant_time + ' 分' : '情報なし'}\n\n`;
            
            text += `最終更新日時: ${t.last_updated} (更新スタッフ: ${currentUser || '不明'})`;
            return text;
        }

        function shareViaLine(id) {
            const t = temples.find(item => item.id === id);
            const msg = generateShareText(t);
            const lineUrl = `https://line.me/R/share?text=${encodeURIComponent(msg)}`;
            window.open(lineUrl, '_blank');
        }

        function shareViaEmail(id) {
            const t = temples.find(item => item.id === id);
            const msg = generateShareText(t);
            const subject = encodeURIComponent(`【寺院情報更新】${t.name}`);
            const body = encodeURIComponent(msg);
            const mailUrl = `mailto:?subject=${subject}&body=${body}`;
            window.location.href = mailUrl;
        }

        function copyToClipboard(id) {
            const t = temples.find(item => item.id === id);
            const msg = generateShareText(t);
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(msg).then(() => {
                    alert('コピー完了しました！LINE Worksや社内チャット等にそのまま貼り付けて送信してください。');
                }).catch(err => {
                    console.error('Clipboard error:', err);
                    fallbackCopyText(msg);
                });
            } else {
                fallbackCopyText(msg);
            }
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert('コピー完了しました！LINE Worksや社内チャット等にそのまま貼り付けて送信してください。');
            } catch (err) {
                alert('自動コピーに失敗しました。お手数ですが、テキストを選択してコピーしてください。');
            }
            document.body.removeChild(textArea);
        }

        // 4. 登録・編集
        let edit_has_pickup = "";
        let edit_pickup_details = [];
        let isEditMode = false;
        
        let edit_has_website = "無し";
        let edit_tsuya_howa = "無し";
        let edit_kokubetsu_howa = "無し";

        let edit_crematory_accompany = "不明";
        let edit_kokubetsu_shukkan_sendo = "不明";

        function showEditScreen(id) {
            const body = document.getElementById('app-body');
            let t = {};

            if (id !== null) {
                isEditMode = true;
                t = temples.find(item => item.id === id);
                tempImages = [...(t.images || [])];
                edit_has_website = t.has_website || (t.website_url ? "有り" : "無し");
                edit_tsuya_howa = t.tsuya_howa || "無し";
                edit_kokubetsu_howa = t.kokubetsu_howa || "無し";
                edit_crematory_accompany = t.crematory_accompany || "不明";
                edit_kokubetsu_shukkan_sendo = t.kokubetsu_shukkan_sendo || "不明";
            } else {
                isEditMode = false;
                tempImages = [];
                edit_has_website = "無し";
                edit_tsuya_howa = "無し";
                edit_kokubetsu_howa = "無し";
                edit_crematory_accompany = "不明";
                edit_kokubetsu_shukkan_sendo = "不明";
                t = {
                    id: "", name: "", kana: "", sect: "", sect_kana: "", postal_code: "", address: "", phone: "", fax: "",
                    has_website: "無し", website_url: "",
                    has_delivery: "無し", delivery_items: [], delivery_other: "",
                    has_pickup: "無し", pickup_details: ["自家用車"], pickup_other: "",
                    first_seven_days: "式中初七日", first_seven_other: "",
                    crematory_accompany: "不明", crematory_accompany_other: "",
                    notes: "",
                    tsuya_entry: "着席合掌", tsuya_entry_other: "",
                    tsuya_opening: "〇〇家菩提寺　〇〇寺　ご住職導師のもとに　執り行います",
                    tsuya_shoko: "", tsuya_howa: "無し", tsuya_howa_time: "", tsuya_exit: "着席合掌", tsuya_exit_other: "",
                    tsuya_chant_time: "",
                    kokubetsu_entry: "着席合掌", kokubetsu_entry_other: "",
                    kokubetsu_opening: "〇〇家菩提寺　〇〇寺　ご住職導師のもとに　執り行います",
                    kokubetsu_indo: "", kokubetsu_shoko: "", kokubetsu_howa: "無し", kokubetsu_howa_time: "", kokubetsu_exit: "起立合掌", kokubetsu_exit_other: "",
                    kokubetsu_shukkan_sendo: "不明",
                    kokubetsu_chant_time: "",
                    last_updated: ""

        function onSectSelectChange(isInit = false) {
            const select = document.getElementById('edit-sect-select');
            const kanaInput = document.getElementById('edit-sect-kana');
            const subInputArea = document.getElementById('sect-sub-input-area');
            const subLabel = document.getElementById('sect-sub-label');

            const val = select.value;

                    kanaInput.value = "";
                    subInputArea.classList.add('hidden');
                }
                return;
            }

            const matched = sectList.find(s => s.name === val);

                    subInputArea.classList.remove('hidden');

        // --- 郵便番号から住所を自動検索 ---
        function searchAddressByZip() {
            let zip = document.getElementById('edit-postal').value.trim();
            zip = zip.replace(/-/g, '');
            if (zip.length !== 7 || isNaN(zip)) {
                alert('郵便番号は半角数字7桁（ハイフン無し）で入力してください。');
                return;
            }
            fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 200 && data.results) {
                        const res = data.results[0];
                        const fullAddress = res.address1 + res.address2 + res.address3;
                        document.getElementById('edit-address').value = fullAddress;
                    } else {
                        alert('該当する住所が見つかりませんでした。郵便番号をもう一度ご確認ください。');
                    }
                })
                .catch(err => {
                    console.error('Error fetching address:', err);
                    alert('住所自動取得の通信中にエラーが発生しました。\nインターネット接続状況をご確認ください。');
                });
        }

        // --- 画像処理 ---
        function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            Array.from(files).forEach(file => {
                if (tempImages.length >= 10) return;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        tempImages.push(compressedBase64);
                        renderPreviewImages();
                    };
                };
            });
            event.target.value = '';
        }

        function renderPreviewImages() {
            const previewContainer = document.getElementById('image-previews');
            const counter = document.getElementById('img-counter');
            counter.innerText = `現在: ${tempImages.length}/10枚`;

            tempImages.forEach((imgSrc, index) => {

                            <i class="fa-solid fa-trash"></i>

                `;
            });
        }

                        kokubetsu_exit, kokubetsu_exit_other: kokubetsu_exit === 'その他' ? kokubetsu_exit_other : '',
                        kokubetsu_shukkan_sendo: edit_kokubetsu_shukkan_sendo,
                        kokubetsu_chant_time,
                        last_updated: timestamp,
                        delete_requested: temples[index].delete_requested || false,
                        delete_request_by: temples[index].delete_request_by || "",
                        delete_request_time: temples[index].delete_request_time || ""
                    };
                }
            } else {
                const maxId = temples.length > 0 ? Math.max(...temples.map(item => item.id)) : 0;
                targetId = maxId + 1;
                const newTemple = {
                    id: targetId, name, kana, sect, sect_kana, postal_code, address, phone, fax,
                    has_website: edit_has_website,
                    website_url: edit_has_website === '有り' ? website_url : "",
                    images: tempImages,
                    has_delivery, delivery_items: has_delivery === '有り' ? checkedItems : [], delivery_other: has_delivery === '有り' ? delivery_other : '',
                    has_pickup: edit_has_pickup, 
                    pickup_details: edit_pickup_details,
                    pickup_other: edit_pickup_details.includes('その他') ? pickup_other : '',
                    first_seven_days, first_seven_other: first_seven_days === 'その他' ? first_seven_other : '',
                    crematory_accompany: edit_crematory_accompany,
                    crematory_accompany_other: edit_crematory_accompany === 'その他' ? crematory_other : '',
                    notes,
                    tsuya_entry, tsuya_entry_other: tsuya_entry === 'その他' ? tsuya_entry_other : '',
                    tsuya_opening, tsuya_shoko, 
                    tsuya_howa: edit_tsuya_howa,
                    tsuya_howa_time: edit_tsuya_howa === '有り' ? tsuya_howa_time : '',
                    tsuya_exit, tsuya_exit_other: tsuya_exit === 'その他' ? tsuya_exit_other : '',
                    tsuya_chant_time,
                    kokubetsu_entry, kokubetsu_entry_other: kokubetsu_entry === 'その他' ? kokubetsu_entry_other : '',
                    kokubetsu_opening, kokubetsu_indo, kokubetsu_shoko, 
                    kokubetsu_howa: edit_kokubetsu_howa,
                    kokubetsu_howa_time: edit_kokubetsu_howa === '有り' ? kokubetsu_howa_time : '',
                    kokubetsu_exit, kokubetsu_exit_other: kokubetsu_exit === 'strong' ? kokubetsu_exit_other : '',
                    kokubetsu_shukkan_sendo: edit_kokubetsu_shukkan_sendo,
                    kokubetsu_chant_time,
                    last_updated: timestamp,
                    delete_requested: false,
                    delete_request_by: "",
                    delete_request_time: ""
                };
                temples.push(newTemple);
            }

            saveToStorage();
            alert('保存を完了しました。');
            showDetailScreen(targetId);
        }

        // --- 5. 管理者専用画面 ---
        function showAdminMenuScreen() {
            if (currentUserRole !== 'admin') {
                alert('この画面は管理者専用です。');
                showListScreen();
                return;
            }
            const body = document.getElementById('app-body');
            
            // ① スタッフ一覧
            let staffListHTML = '';
            if (staffs.length === 0) {
                staffListHTML = `<div class="p-3 text-center text-gray-400 text-xs">登録されているスタッフはいません。</div>`;
            } else {
                staffListHTML = `<ul class="divide-y text-xs border rounded-lg overflow-hidden bg-gray-50">`;
                staffs.forEach(st => {
                    staffListHTML += `
                        <li class="p-3 flex justify-between items-center bg-white">
                            <span class="font-mono font-semibold text-gray-700">${st}</span>
                            <button onclick="deleteStaff('${st}')" class="text-red-600 hover:text-red-800 p-1">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </li>
                    `;
                });
                staffListHTML += `</ul>`;
            }

            // ② 削除依頼リスト
            const requestedTemples = temples.filter(item => item.delete_requested);
            let deleteRequestsHTML = '';
            
            if (requestedTemples.length === 0) {
                deleteRequestsHTML = `
                    <div class="p-4 border rounded-lg bg-gray-50 text-gray-400 text-center">
                        現在、届いている削除依頼はありません。
                    </div>
                `;
            } else {
                deleteRequestsHTML = `
                    <div class="space-y-3">
                        <div class="bg-red-50 border border-red-200 rounded-lg p-3 text-red-900 font-bold text-xs flex items-center gap-1.5 animate-pulse">
                            <i class="fa-solid fa-triangle-exclamation text-[14px]"></i>
                            <span>削除依頼が来ています（${requestedTemples.length}件）</span>
                        </div>
                        
                        <div class="space-y-2">
                            ${requestedTemples.map(rt => `
                                <div class="bg-white border border-gray-200 rounded-lg p-3 space-y-2 shadow-sm text-xs">
                                    <div class="flex justify-between items-start border-b pb-1.5">
                                        <div>
                                            <span class="text-[10px] text-gray-400 block">${rt.sect}</span>
                                            <span class="font-bold text-gray-800 text-sm">${rt.name}</span>
                                        </div>
                                        <span class="text-[9px] bg-amber-100 text-amber-800 border border-amber-300 font-bold px-1.5 py-0.5 rounded">依頼中</span>
                                    </div>
                                    <p class="text-gray-500 text-[10px]">・依頼スタッフ: <span class="font-bold text-gray-700">${rt.delete_request_by}</span></p>
                                    <p class="text-gray-500 text-[10px] border-b pb-1.5">・依頼日時: <span class="font-bold text-gray-700">${rt.delete_request_time}</span></p>
                                    
                                    <div class="flex gap-2 pt-1">
                                        <button onclick="approveDeleteTemple(${rt.id}, '${rt.name}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold p-2 rounded shadow-sm text-[11px] transition">
                                            許可 (完全に削除)
                                        </button>
                                        <button onclick="rejectDeleteRequest(${rt.id})" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 border font-bold p-2 rounded text-[11px] transition">
                                            却下 (依頼の取消)
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            body.innerHTML = `
                <button onclick="showListScreen()" class="mb-4 text-emerald-800 font-bold flex items-center gap-1 hover:underline text-sm">
                    <i class="fa-solid fa-arrow-left"></i> 寺院一覧に戻る
                </button>

                <div class="bg-white rounded-lg border p-4 space-y-5 text-xs shadow-sm">
                    <h3 class="text-sm font-bold text-gray-700 border-b pb-2 flex items-center gap-1">
                        <i class="fa-solid fa-user-gear text-slate-700"></i>管理者画面（スタッフ＆削除管理）
                    </h3>

                    <!-- 削除依頼一覧セクション -->
                    <div class="space-y-2 border-b pb-5">
                        <span class="block font-bold text-gray-700"><i class="fa-solid fa-trash-can mr-1"></i>スタッフからの削除依頼管理</span>
                        ${deleteRequestsHTML}
                    </div>

                    <!-- スタッフ新規追加 -->
                    <div class="bg-emerald-50 border border-emerald-100 rounded-lg p-3 space-y-3">
                        <span class="block font-bold text-emerald-800"><i class="fa-solid fa-user-plus mr-1"></i>スタッフアカウントの新規登録</span>
                        
                        <div>
                            <label class="block text-gray-600 font-bold mb-1">新規スタッフID（苗字をアルファベットで入力）</label>
                            <div class="flex items-center">
                                <span class="bg-gray-200 border-t border-b border-l p-2.5 rounded-l font-mono text-gray-600 font-bold">saitama-</span>
                                <input type="text" id="new-staff-suffix" class="flex-grow p-2.5 border rounded-r focus:outline-emerald-600 font-mono" placeholder="例: saito">
                            </div>
                            <p class="text-[10px] text-gray-400 mt-1">※自動的に「saitama-苗字」の形式でIDが登録されます。</p>
                        </div>

                        <div>
                            <label class="block text-gray-500 font-bold">初期パスワード（全員共通）</label>
                            <input type="text" disabled class="w-full p-2.5 border rounded bg-gray-100 font-mono text-gray-500" value="sakado0470">
                        </div>

                        <button onclick="addNewStaff()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white p-2.5 rounded-lg font-bold transition shadow-sm flex items-center justify-center gap-1">
                            <i class="fa-solid fa-user-check"></i>スタッフIDを登録する
                        </button>
                    </div>

                    <!-- スタッフ一覧 -->
                    <div class="space-y-2 pt-2">
                        <span class="block font-bold text-gray-600"><i class="fa-solid fa-users mr-1"></i>登録中のスタッフ一覧 (現在 ${staffs.length}名)</span>
                        ${staffListHTML}
                    </div>
                </div>
            `;
        }

        // 削除の許可
        function approveDeleteTemple(id, name) {
            if (!confirm(`本当に「${name}」を【完全に削除】しますか？\nこの操作は元に戻せません。`)) {
                return;
            }
            temples = temples.filter(item => item.id !== id);
            saveToStorage();
            alert(`「${name}」のデータを完全に削除しました。`);
            showAdminMenuScreen();
        }

        // 削除の却下
        function rejectDeleteRequest(id) {
            const index = temples.findIndex(item => item.id === id);
            if (index !== -1) {
                temples[index].delete_requested = false;
                temples[index].delete_request_by = "";
                temples[index].delete_request_time = "";
            }
            saveToStorage();
            alert('削除依頼を却下（取り消し）しました。お寺データは維持されます。');
            showAdminMenuScreen();
        }

        // スタッフ追加
        function addNewStaff() {
            const suffix = document.getElementById('new-staff-suffix').value.trim().toLowerCase();
            if (!suffix) {
                alert("アルファベットでスタッフの苗字を入力してください。");
                return;
            }
            if (!/^[a-z]+$/.test(suffix)) {
                alert("苗字は半角アルファベット（小文字のみ）で入力してください。");
                return;
            }
            const fullId = `saitama-${suffix}`;
            if (staffs.includes(fullId)) {
                alert(`スタッフID「${fullId}」はすでに登録されています。`);
                return;
            }
            if (fullId === 'saitama-arikawa') {
                alert("管理者と同じIDは登録できません。");
                return;
            }
            staffs.push(fullId);
            saveStaffsToStorage();
            alert(`スタッフ「${fullId}」を登録しました。\nログインパスワードは一律「sakado0470」です。`);
            showAdminMenuScreen();
        }

        function deleteStaff(staffId) {
            if (!confirm(`スタッフ「${staffId}」のアクセス権を削除します。\nよろしいですか？`)) {
                return;
            }
            staffs = staffs.filter(st => st !== staffId);
            saveStaffsToStorage();
            alert(`スタッフ「${staffId}」を削除しました。`);
            showAdminMenuScreen();
        }
    </script>
</body>
</html>
